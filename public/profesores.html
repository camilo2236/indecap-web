<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>INDECAP · Inducción Docente</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>

*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:#f0f0f0;height:100%;-webkit-font-smoothing:antialiased}

/* ===== NAV ===== */
.top-nav{position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;padding:0 20px;gap:12px;z-index:100}
.nav-logo{font-size:16px;font-weight:600;color:#1a086e;letter-spacing:-0.01em;flex-shrink:0}
.nav-logo span{color:#805600}
.nav-badge{background:#eef0ff;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600;color:#3730a3;flex-shrink:0}
.nav-spacer{flex:1}
.nav-progress-wrap{display:flex;align-items:center;gap:8px}
.nav-progress-bar{width:80px;height:4px;background:#e5e5e5;border-radius:100px;overflow:hidden}
.nav-progress-fill{height:100%;background:#1a086e;border-radius:100px;transition:width 0.4s}
.nav-pct{font-size:12px;font-weight:600;color:#1a086e}
.nav-menu-btn{width:36px;height:36px;border:1px solid #e5e5e5;border-radius:8px;background:none;cursor:pointer;display:none;align-items:center;justify-content:center;flex-direction:column;gap:4px;flex-shrink:0;padding:0}
.nav-menu-line{width:14px;height:1.5px;background:#666;border-radius:2px;display:block}
.nav-exit{background:none;border:1px solid #e5e5e5;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:500;color:#555;cursor:pointer;white-space:nowrap}
.nav-exit:hover{border-color:#1a086e;color:#1a086e}

/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;padding-top:52px}

/* ===== SIDEBAR ===== */
.sidebar{width:256px;flex-shrink:0;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;height:100%;overflow:hidden;transition:transform 0.28s cubic-bezier(.4,0,.2,1)}
.sidebar-header{padding:16px;border-bottom:1px solid #e5e5e5;flex-shrink:0;background:#fafafa}
.sidebar-label{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:4px}
.sidebar-title{font-size:14px;font-weight:600;color:#1a086e;margin-bottom:2px}
.sidebar-sub{font-size:11.5px;color:#666;line-height:1.4}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.mod-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all 0.15s}
.mod-item:hover{background:#f5f5f5}
.mod-item.active{background:#eef0ff;border-color:#c7d2fe}
.mod-item.done{opacity:0.75}
.mod-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.mod-info{flex:1;min-width:0}
.mod-name{font-size:12.5px;font-weight:500;color:#111;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mod-item.active .mod-name{color:#1a086e;font-weight:600}
.mod-dur{font-size:11px;color:#999;margin-top:1px}
.mod-done-icon{font-size:13px;color:#16a34a;flex-shrink:0;font-weight:600}

/* ===== OVERLAY (mobile) ===== */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:49;top:52px}

/* ===== MAIN ===== */
.main-content{flex:1;overflow-y:auto;background:#f7f7f8}
.main-inner{max-width:720px;margin:0 auto;padding:24px 24px 80px}

/* ===== BREADCRUMB ===== */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:#999;margin-bottom:14px}
.bc-arrow{font-size:10px}
.bc-cur{color:#1a086e;font-weight:600}

/* ===== LESSON HEADER ===== */
.lesson-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.lesson-icon{font-size:22px}
.lesson-meta{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.05em}
.lesson-h{font-size:22px;font-weight:600;color:#111;margin-bottom:20px;line-height:1.3;letter-spacing:-0.02em}

/* ===== CONTENT CARDS ===== */
.card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:16px;margin-bottom:12px}
.card-label{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px}
.highlight{background:#eef0ff;border-radius:8px;padding:12px 14px;border-left:3px solid #6366f1;margin-bottom:10px;font-size:13.5px;color:#312e81;line-height:1.65}
.alert{background:#fffbeb;border-radius:8px;padding:12px 14px;border-left:3px solid #f59e0b;margin-bottom:10px;font-size:13.5px;color:#92400e;line-height:1.65}
.success{background:#f0fdf4;border-radius:8px;padding:12px 14px;border-left:3px solid #22c55e;margin-bottom:10px;font-size:13.5px;color:#14532d;line-height:1.65}
.a-good{background:#f0fdf4;border-radius:6px;padding:8px 12px;font-size:13px;color:#14532d;margin:4px 0}
.a-bad{background:#fef2f2;border-radius:6px;padding:8px 12px;font-size:13px;color:#991b1b;margin:4px 0}
.a-tip{background:#fffbeb;border-radius:6px;padding:8px 12px;font-size:13px;color:#92400e;margin:4px 0}
.a-warn{background:#fffbeb;border-radius:6px;padding:8px 12px;font-size:13px;color:#92400e;margin:4px 0}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.data-card{background:#fafafa;border-radius:8px;padding:12px;border:1px solid #e5e5e5}
.data-card-title{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.data-card-val{font-size:20px;font-weight:600;color:#1a086e;letter-spacing:-0.02em}
.data-card-sub{font-size:11.5px;color:#666;margin-top:2px}
p{font-size:13.5px;color:#444;line-height:1.75;margin-bottom:10px}
h2{font-size:17px;font-weight:600;color:#111;margin:16px 0 8px;letter-spacing:-0.01em}
h2:first-child{margin-top:0}
h3{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 6px}
ul{margin:4px 0 10px 16px;display:flex;flex-direction:column;gap:5px}
ul li{font-size:13.5px;color:#444;line-height:1.6}
strong{font-weight:600;color:#222}

/* ===== AGENT BUBBLES ===== */
.b-agent{background:linear-gradient(135deg,#1a086e,#312783);color:#fff;border-radius:12px 2px 12px 12px;padding:10px 14px;font-size:13px;max-width:480px;margin-bottom:6px;line-height:1.6}
.t-step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.t-num{min-width:24px;height:24px;border-radius:50%;background:#1a086e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px}
.t-label{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.branches{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.br{padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:500}
.br-y{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.br-n{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.br-m{background:#f5f5f5;color:#555;border:1px solid #e5e5e5}

/* ===== CIERRE ===== */
.cierre-box{background:#fafafa;border-radius:8px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #1a086e;border:1px solid #e5e5e5;border-left:3px solid #1a086e}
.cierre-lbl{font-size:10px;font-weight:600;color:#1a086e;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}

/* ===== OBJECIONES ===== */
.obj-wrap{margin-bottom:6px}
.obj-btn{width:100%;text-align:left;padding:11px 14px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13.5px;font-weight:500;color:#111;transition:all 0.15s}
.obj-btn:hover{border-color:#1a086e;background:#fafafa}
.obj-freq{font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;background:#eef0ff;color:#3730a3;flex-shrink:0;margin-left:8px}
.obj-freq.red{background:#fef2f2;color:#dc2626}
.obj-body{display:none;padding:12px 14px;background:#fafafa;border:1px solid #e5e5e5;border-top:none;border-radius:0 0 10px 10px;margin-top:-6px}
.obj-body.open{display:block}

/* ===== SCRIPTS ===== */
.sf{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.sf-btn{padding:5px 12px;border:1px solid #e5e5e5;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;background:#fff;color:#555;transition:all 0.15s}
.sf-btn:hover,.sf-btn.active{background:#1a086e;color:#fff;border-color:#1a086e}
.sc{background:#fff;border-radius:10px;padding:12px;border:1px solid #e5e5e5;margin-bottom:8px;transition:all 0.15s}
.sc:hover{border-color:#c7d2fe}
.sc-tag{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:100px;margin-bottom:6px}
.t-cierre{background:#f0fdf4;color:#15803d}
.t-salud{background:#eef0ff;color:#3730a3}
.t-excel{background:#f0fdf4;color:#15803d}
.t-cosm{background:#fffbeb;color:#92400e}
.t-vet{background:#fff7ed;color:#c2410c}
.t-admin{background:#eff6ff;color:#1d4ed8}
.t-tech{background:#f5f3ff;color:#7c3aed}
.t-dep{background:#fef2f2;color:#dc2626}
.t-gen{background:#f5f5f5;color:#555}
.sc-title{font-size:13px;font-weight:600;color:#111;margin-bottom:4px}
.sc-sit{font-size:11.5px;color:#999;margin-bottom:6px;font-style:italic}
.sc-msg{font-size:12.5px;line-height:1.65;color:#444;background:#fafafa;border-radius:6px;padding:8px 11px;border-left:3px solid #1a086e;white-space:pre-wrap;border:1px solid #e5e5e5;border-left:3px solid #1a086e}
.cp-btn{margin-top:6px;padding:4px 10px;background:none;border:1px solid #e5e5e5;border-radius:6px;font-size:11.5px;font-weight:500;cursor:pointer;color:#555;transition:all 0.15s}
.cp-btn:hover{border-color:#1a086e;color:#1a086e}
.cp-btn.copied{border-color:#22c55e;color:#15803d;background:#f0fdf4}
.search-in{width:100%;padding:8px 12px;margin-bottom:12px;background:#fff;border:1px solid #e5e5e5;border-radius:8px;font-size:14px;color:#111;transition:all 0.15s;outline:none}
.search-in:focus{border-color:#1a086e;box-shadow:0 0 0 3px rgba(26,8,110,0.06)}

/* ===== TIP CARDS ===== */
.tip-card{background:#fff;border-radius:12px;padding:16px;border:1px solid #e5e5e5;margin-bottom:12px;border-left:3px solid #1a086e}
.tip-badge{display:inline-block;background:#1a086e;color:#fff;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;margin-bottom:8px}
.tip-title{font-size:15px;font-weight:600;color:#111;margin-bottom:8px;line-height:1.35;letter-spacing:-0.01em}
.tip-body{font-size:13.5px;color:#444;line-height:1.7;margin-bottom:10px}
.tip-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.tip-wrong{background:#fef2f2;border-radius:8px;padding:10px;border-left:3px solid #dc2626}
.tip-right{background:#f0fdf4;border-radius:8px;padding:10px;border-left:3px solid #22c55e}
.tip-clabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.tip-wrong .tip-clabel{color:#991b1b}
.tip-right .tip-clabel{color:#166534}
.tip-ctext{font-size:12.5px;line-height:1.6;color:#333}
.tip-remember{background:#eef0ff;border-radius:8px;padding:10px 12px;font-size:13px;color:#312e81;font-weight:500;line-height:1.6;margin-top:8px}

/* ===== SIMULADOR ===== */
.sim-lay{display:grid;grid-template-columns:200px 1fr;gap:12px}
.pc{display:flex;gap:8px;align-items:center;padding:9px 10px;border-radius:8px;cursor:pointer;background:#fff;border:1px solid #e5e5e5;margin-bottom:5px;transition:all 0.15s}
.pc:hover,.pc.active{border-color:#1a086e;background:#eef0ff}
.pc-av{width:32px;height:32px;border-radius:50%;background:#1a086e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.sim-panel{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5;display:flex;flex-direction:column}
.sim-hd{background:#1a086e;padding:12px 14px;display:flex;align-items:center;gap:10px}
.sim-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.sim-sts{display:flex;border-bottom:1px solid #f0f0f0}
.sim-st{flex:1;padding:8px;text-align:center;border-right:1px solid #f0f0f0}
.sim-st:last-child{border-right:none}
.sim-sn{font-size:17px;font-weight:600;color:#1a086e}
.sim-sl{font-size:11px;color:#666}
.sim-bar{height:3px;background:#f0f0f0}
.sim-bar-fill{height:100%;background:linear-gradient(90deg,#1a086e,#805600);transition:width 0.4s}
.chat{flex:1;min-height:240px;max-height:320px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#f7f7f8}
.msg{max-width:80%;font-size:13px;line-height:1.5;padding:8px 11px;border-radius:10px}
.msg-p{background:#fff;border:1px solid #e5e5e5;border-radius:2px 10px 10px 10px;align-self:flex-start}
.msg-a{background:#1a086e;color:#fff;border-radius:10px 2px 10px 10px;align-self:flex-end}
.msg-h{background:#fffbeb;border:1px solid #fde68a;color:#92400e;font-size:11.5px;border-radius:8px;align-self:center;max-width:94%;text-align:center;font-style:italic;padding:6px 10px}
.msg-g{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-size:12px;border-radius:8px;align-self:center;max-width:94%;padding:6px 10px}
.msg-b{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:12px;border-radius:8px;align-self:center;max-width:94%;padding:6px 10px}
.opts-area{padding:10px 12px;background:#fafafa;border-top:1px solid #f0f0f0}
.opts-lbl{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.opt-btn{width:100%;text-align:left;padding:7px 10px;background:#fff;border:1px solid #e5e5e5;border-radius:7px;font-size:12.5px;cursor:pointer;margin-bottom:4px;color:#111;line-height:1.4;transition:all 0.15s}
.opt-btn:hover{border-color:#1a086e}
.opt-btn.correct{background:#f0fdf4;border-color:#86efac;color:#166534;cursor:default}
.opt-btn.wrong{background:#fef2f2;border-color:#fca5a5;color:#991b1b;cursor:default}

/* ===== PROGRESS PAGE ===== */
.tr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.tr-stat{background:#fff;border-radius:10px;padding:12px;border:1px solid #e5e5e5;text-align:center}
.tr-n{font-size:28px;font-weight:600;color:#1a086e;letter-spacing:-0.02em}
.tr-l{font-size:11.5px;color:#666;margin-top:2px}
.mp-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.mp-row:last-child{border-bottom:none}
.mp-name{font-size:13.5px;font-weight:500;flex:1}
.mp-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}
.s-done{background:#f0fdf4;color:#166534}
.s-pend{background:#f5f5f5;color:#666}

/* ===== BOTTOM NAV ===== */
.bottom-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-top:1px solid #e5e5e5;flex-shrink:0;background:#fff}
.btn-nav{background:none;border:1px solid #e5e5e5;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:500;color:#555;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-nav:hover{border-color:#1a086e;color:#1a086e}
.btn-done{background:#1a086e;border:none;border-radius:8px;padding:8px 18px;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.btn-done:hover{background:#312783}
.btn-done.completed{background:#15803d}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .nav-menu-btn{display:flex}
  .nav-progress-wrap{display:none}
  .sidebar{position:fixed;top:52px;left:0;bottom:0;transform:translateX(-100%);z-index:50}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:block}
  .sidebar-overlay.visible{display:block}
  .app{height:auto;min-height:calc(100vh - 52px)}
  .main-content{height:auto;min-height:calc(100vh - 52px - 56px)}
  .main-inner{padding:16px 14px 60px}
  .two{grid-template-columns:1fr}
  .data-grid{grid-template-columns:1fr 1fr}
  .tip-compare{grid-template-columns:1fr}
  .sim-lay{grid-template-columns:1fr}
  h2{font-size:15px}
  .lesson-h{font-size:18px}
  .bottom-nav{padding:8px 14px}
}
@media(min-width:769px){
  .app{height:calc(100vh - 52px)}
  .main-content{height:100%;overflow-y:auto}
}


</style>
</head>
<body>
<nav class="top-nav">
  <span class="nav-logo">IN<span style="color:#805600">D</span>ECAP</span>
  <span class="nav-badge">Profesores</span>
  <div class="nav-spacer"></div>
  <div class="nav-progress-wrap">
    <div class="nav-progress-bar"><div class="nav-progress-fill" id="progress-bar" style="width:0%"></div></div>
    <span class="nav-pct" id="progress-txt">0%</span>
  </div>
  <button class="nav-menu-btn" onclick="toggleSidebar()">
    <span class="nav-menu-line"></span>
    <span class="nav-menu-line"></span>
    <span class="nav-menu-line"></span>
  </button>
  <button class="nav-exit" onclick="window.location.href='/plataforma'">← Plataforma</button>
</nav>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-label">INDECAP · Plataforma</div>
      <div class="sidebar-title">Inducción Docente</div>
      <div class="sidebar-sub">Completa los 8 módulos antes de tu primer día de clase.</div>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden">
    <div class="main-content" id="main-scroll">
      <div class="main-inner">
        <div class="breadcrumb">
          <span>Profesores</span>
          <span class="bc-arrow">›</span>
          <span class="bc-cur" id="bc-cur">Inicio</span>
        </div>
        <div id="lesson-header">
          <div style="text-align:center;padding:40px 0 16px;font-size:2.5rem">👨‍🏫</div>
          <div class="lesson-h" style="text-align:center;margin-bottom:8px">Bienvenido al equipo INDECAP</div>
          <p style="text-align:center;color:#666;margin-bottom:0">Selecciona un módulo en el menú para comenzar tu inducción.</p>
        </div>
        <div id="lesson-content"></div>
      </div>
    </div>
    <div class="bottom-nav" id="bottom-nav" style="display:none">
      <button class="btn-nav" id="btn-prev" onclick="navigateLesson(-1)">← Anterior</button>
      <button class="btn-done" id="btn-done" onclick="markCurrentDone()">Marcar completado</button>
      <button class="btn-nav" id="btn-next" onclick="navigateLesson(1)">Siguiente →</button>
    </div>
  </div>
</div>
<script>

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('visible');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

const SECCION='profesores',SK='indecap_profesores_v3';
let progress={},currentIdx=-1;
function saveLocal(){try{localStorage.setItem(SK,JSON.stringify(progress));}catch(e){}}
async function loadProgress(){
  try{const r=await fetch('/api/progreso?seccion='+SECCION);if(r.ok){const d=await r.json();if(d.progress&&Object.keys(d.progress).length){progress=d.progress;saveLocal();return;}}}catch(e){}
  try{const l=localStorage.getItem(SK);if(l)progress=JSON.parse(l);}catch(e){}
}
async function saveProgress(id,pts){
  progress[id]=true;saveLocal();
  try{await fetch('/api/progreso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seccion:SECCION,modulo_id:id,puntaje:pts||0})});}catch(e){}
}
const MODULES=[
  {id:'historia',     icon:'🏛️', label:'Historia y valores',        duration:'15 min'},
  {id:'metodologia',  icon:'📐', label:'Metodología de enseñanza',  duration:'20 min'},
  {id:'plataformas',  icon:'💻', label:'Plataformas y sistemas',    duration:'20 min'},
  {id:'reglamento',   icon:'📋', label:'Reglamento y protocolos',   duration:'25 min'},
  {id:'primerosdias', icon:'🌟', label:'Primeros días de clase',    duration:'20 min'},
  {id:'evaluacion',   icon:'📊', label:'Sistema de evaluación',     duration:'20 min'},
  {id:'retencion',    icon:'❤️', label:'Tu rol en la retención',    duration:'25 min'},
  {id:'experiencias', icon:'✨', label:'Experiencias exitosas',      duration:'15 min'},
];
function updateProgressUI(){
  const done=Object.keys(progress).length,total=MODULES.length,pct=Math.round(done/total*100);
  const b=document.getElementById('progress-bar'),t=document.getElementById('progress-txt');
  if(b)b.style.width=pct+'%';if(t)t.textContent=pct+'%';
}
function renderSidebar(){
  const list=document.getElementById('sidebar-list');if(!list)return;
  list.innerHTML=MODULES.map((m,i)=>{
    const done=progress[m.id],active=i===currentIdx;
    return '<div class="mod-item'+(active?' active':'')+(done?' done':'')+'" onclick="selectModule('+i+');closeSidebar()">'
      +'<span class="mod-icon">'+m.icon+'</span><div class="mod-info"><div class="mod-name">'+m.label+'</div><div class="mod-dur">'+m.duration+'</div></div>'
      +(done?'<span class="mod-done-icon">&#10003;</span>':'')+'</div>';
  }).join('');
  updateProgressUI();
}
function selectModule(idx){
  currentIdx=idx;const m=MODULES[idx];
  renderSidebar();
  document.getElementById('bc-cur').textContent=m.label;
  document.getElementById('lesson-header').innerHTML=
    '<div class="lesson-meta-row"><span class="lesson-icon">'+m.icon+'</span>'
    +'<span class="lesson-meta">Módulo '+(idx+1)+' de '+MODULES.length+' · '+m.duration+'</span></div>'
    +'<div class="lesson-h">'+m.label+'</div>';
  document.getElementById('lesson-content').innerHTML='';
  const fns=getContentFunctions();if(fns[m.id])fns[m.id]();
  document.getElementById('bottom-nav').style.display='flex';
  document.getElementById('btn-prev').style.visibility=idx===0?'hidden':'visible';
  document.getElementById('btn-next').style.visibility=idx===MODULES.length-1?'hidden':'visible';
  const db=document.getElementById('btn-done');
  if(db){if(progress[m.id]){db.innerHTML='&#10003; Completado';db.classList.add('completed');}else{db.innerHTML='Marcar completado';db.classList.remove('completed');}}
  const ms=document.getElementById('main-scroll');if(ms)ms.scrollTop=0;
  window.scrollTo({top:0,behavior:'smooth'});
}
function markCurrentDone(){
  if(currentIdx<0)return;const m=MODULES[currentIdx];
  saveProgress(m.id,0);renderSidebar();
  const db=document.getElementById('btn-done');if(db){db.innerHTML='&#10003; Completado';db.classList.add('completed');}
  if(currentIdx<MODULES.length-1)setTimeout(()=>selectModule(currentIdx+1),600);
}
function navigateLesson(dir){const n=currentIdx+dir;if(n>=0&&n<MODULES.length)selectModule(n);}
function copyMsg(btn,msg){
  navigator.clipboard.writeText(msg).catch(()=>{const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
  const o=btn.innerHTML;btn.innerHTML='&#10003; Copiado';btn.classList.add('copied');
  setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('copied');},2000);
}

metodologia:()=>setC(`<div class="card"><h2>Cómo enseñamos en INDECAP</h2><p>INDECAP aplica una <strong>metodología teórico-práctica</strong> basada en el desarrollo de competencias. No enseñamos materias — formamos personas capaces de hacer algo concreto.</p><div class="highlight"><strong>Principio:</strong> El estudiante no aprueba por memorizar — aprueba por demostrar que puede hacer.</div><h3>Estructura de una sesión ideal</h3><ul><li><strong>Apertura (10%):</strong> Conectar con lo anterior. ¿Para qué sirve lo de hoy?</li><li><strong>Desarrollo teórico (30%):</strong> Explicación con ejemplos del sector real.</li><li><strong>Práctica guiada (40%):</strong> El docente hace, el estudiante observa. Luego al revés.</li><li><strong>Práctica autónoma (15%):</strong> El estudiante lo hace solo.</li><li><strong>Cierre (5%):</strong> ¿Qué aprendimos? ¿Dónde lo van a usar?</li></ul><div class="alert"><strong>Si un estudiante no entiende, el problema casi siempre es la forma de enseñar, no la capacidad del estudiante.</strong></div></div>`),
plataformas:()=>setC(`<div class="card"><h2>Las herramientas digitales de INDECAP</h2><div class="highlight"><strong>Q10 es el sistema central.</strong> Aquí registras asistencia, notas y competencias. Todo lo que no esté en Q10 no existe institucionalmente.</div><h3>Q10 — Sistema académico</h3><ul><li>El coordinador te entregará tus credenciales el primer día.</li><li>Registra la asistencia en cada clase — no al final de la semana.</li><li>Las notas deben ingresarse antes de la fecha límite del ciclo.</li><li>Nunca compartas tus credenciales.</li></ul><h3>Comunicación interna</h3><ul><li>Canal principal: WhatsApp (grupo de docentes por sede).</li><li>Comunicados oficiales: correo electrónico institucional.</li></ul></div>`),

experiencias:()=>setC(`<div class="card"><h2>Lo que funciona — voces del equipo</h2><div class="highlight">"El primer día no uso el tablero. Me siento con ellos, les pregunto por qué están aquí. Cuando entiendo sus metas, puedo conectar cada clase con algo que les importa."<br><span style="font-size:11.5px;color:#666;margin-top:4px;display:block">— Docente de Enfermería, sede Medellín</span></div><div class="highlight">"Les digo desde el primer día: aquí vienen a equivocarse. El laboratorio es el único lugar donde equivocarse no cuesta nada — afuera sí cuesta."<br><span style="font-size:11.5px;color:#666;margin-top:4px;display:block">— Docente de Cosmetología, sede Envigado</span></div><div class="highlight">"Cuando noto que alguien está fallando, no lo espero en el salón — lo busco antes de la clase. Una conversación de 5 minutos en el corredor vale más que diez clases sin ese contacto."<br><span style="font-size:11.5px;color:#666;margin-top:4px;display:block">— Docente de SST, sede Caldas</span></div><h3>Lo que los estudiantes más valoran</h3><ul><li>Que lleguen preparados y puntuales</li><li>Que expliquen con ejemplos reales del sector</li><li>Que los traten como adultos</li><li>Que sean justos y transparentes con las notas</li></ul></div>`),

function setC(html){document.getElementById('lesson-content').innerHTML=html;}

(async()=>{await loadProgress();renderSidebar();})();
